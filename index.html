<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Centro de Control Dirección</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #222;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 50px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      max-width: 900px;
      width: 100%;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    p {
      font-size: 22px;
      color: #555;
    }

    .status {
      margin-top: 30px;
      display: inline-block;
      padding: 14px 24px;
      border-radius: 999px;
      background: #e8f5e9;
      color: #1b5e20;
      font-weight: bold;
      font-size: 18px;
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="card">
      <h1>Centro de Control Dirección</h1>
      <p>Dashboard web conectado a SharePoint y Microsoft 365.</p>
      <div class="status">GitHub Pages funcionando correctamente</div>
    </section>
  </main>
</body>
</html>
